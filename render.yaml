services:
  - type: web
    name: trip-tracking-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: MONGO_URI
        sync: false # Set this in the Render Dashboard
      - key: JWT_SECRET_KEY
        generateValue: true